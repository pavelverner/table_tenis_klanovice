<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1a1f2e"/>

  <!-- Paddle handle -->
  <rect x="38" y="42" width="7" height="16" rx="3.5" ry="3.5"
        fill="#c8a46e" transform="rotate(-40 41.5 50)"/>

  <!-- Paddle head -->
  <ellipse cx="26" cy="30" rx="18" ry="18" fill="#e63946"/>
  <!-- Paddle center line -->
  <line x1="26" y1="12" x2="26" y2="48" stroke="#c0283a" stroke-width="1.5" opacity="0.6"/>

  <!-- Rubber surface texture -->
  <ellipse cx="26" cy="30" rx="14" ry="14" fill="none"
           stroke="#ff6b7a" stroke-width="1" opacity="0.4"/>

  <!-- Ball -->
  <circle cx="46" cy="16" r="8" fill="#f0f0f0"/>
  <circle cx="46" cy="16" r="8" fill="none" stroke="#ddd" stroke-width="0.5"/>
  <!-- Ball shine -->
  <circle cx="43" cy="13" r="2.5" fill="white" opacity="0.7"/>
  <!-- Ball curve line -->
  <path d="M40 16 Q46 10 52 16" fill="none" stroke="#bbb" stroke-width="1"/>
</svg>
